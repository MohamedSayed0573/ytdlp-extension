name: Build and Deploy to EC2
on:
    push:
        branches: main
    workflow_dispatch:
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Docker Login
              uses: docker/login-action@v3.7.0
              with:
                  registry: docker.io
                  username: ${{secrets.DOCKERHUB_USERNAME}}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and push Docker image
              uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
              with:
                  context: .
                  target: prod
                  tags: ${{ secrets.DOCKERHUB_USERNAME }}/yt-dlp-api:latest
                  push: true

    deploy:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Copy docker-compose file to EC2
              uses: appleboy/scp-action@v0.1.7
              with:
                  host: ${{ secrets.EC2_HOST }}
                  username: ubuntu
                  key: ${{ secrets.EC2_SSH_KEY }} # Make sure the secret name matches what you have in GitHub
                  source: "docker-compose.prod.yml"
                  target: "~/" # Copies to /home/ubuntu/

            - name: Pull the image & Start the container
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{secrets.EC2_HOST}}
                  username: ubuntu
                  key: ${{secrets.EC2_SSH_KEY}}
                  script: |
                      set -e

                      # To be able to pull the image, you have to login to docker first
                      # You could use docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN}}.
                      # But that will print your docker password in the logs (insecure)
                      echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

                      # Pull the image
                      # -f flag is used to specify the docker-compose file. Default is docker-compose.yml
                      docker compose -f docker-compose.prod.yml pull
                      
                      # Start the container. If the container hasn't changed, it will not be restarted
                      # -d flag is used to run the container in detached mode
                      docker compose -f docker-compose.prod.yml up -d

                      # Clean up old images
                      # -f flag is used to force the prune
                      docker image prune -f
