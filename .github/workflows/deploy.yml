name: Build and Deploy to EC2
on:
    push:
        branches:
            - "**"
        tags:
            - "api-v*"
        paths:
            - "api/**"
    workflow_dispatch:
jobs:
    build:
        runs-on: ubuntu-latest
        env:
            SHORT_SHA: ""

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Docker Login
              uses: docker/login-action@v3.7.0
              with:
                  registry: docker.io
                  username: ${{secrets.DOCKERHUB_USERNAME}}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Set short SHA
              run: |
                  GITHUB_SHA=${{github.sha}}
                  echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

            - name: Build and push Docker image
              uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
              with:
                  context: ./api
                  target: ${{ startsWith(github.ref, 'refs/tags/api-v') && 'prod' || 'staging'}}
                  tags: |
                      ${{ secrets.DOCKERHUB_USERNAME }}/yt-dlp-api:${{ startsWith(github.ref, 'refs/tags/api-v') && 'prod' || 'staging' }}-${{ env.SHORT_SHA }}
                  push: true

    deploy:
        needs: build
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/heads/') || startsWith(github.ref, 'refs/tags/api-v')
        runs-on: ubuntu-latest
        env:
            DEPLOY_ENV: ${{ startsWith(github.ref, 'refs/tags/api-v') && 'prod' || 'staging' }}
            COMPOSE_FILE: ${{ startsWith(github.ref, 'refs/tags/api-v') && 'api/docker-compose.prod.yml' || 'api/docker-compose.staging.yml' }}
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Copy docker-compose file to EC2
              uses: appleboy/scp-action@v0.1.7
              with:
                  host: ${{ secrets.EC2_HOST }}
                  username: ubuntu
                  key: ${{ secrets.EC2_SSH_KEY }}
                  source: ${{ env.COMPOSE_FILE }}
                  target: "~/"

            - name: Pull the image & Start the container
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{secrets.EC2_HOST}}
                  username: ubuntu
                  key: ${{secrets.EC2_SSH_KEY}}
                  script: |
                      set -e
                      echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

                      export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
                      TEMP_SHA="${{ github.sha }}"
                      export IMAGE_TAG="${{ env.DEPLOY_ENV }}-${TEMP_SHA::7}"

                      docker compose -p "${{ env.DEPLOY_ENV }}" -f "${{ env.COMPOSE_FILE }}" pull
                      docker compose -p "${{ env.DEPLOY_ENV }}" -f "${{ env.COMPOSE_FILE }}" up -d
                      docker image prune -f
