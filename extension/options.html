<!doctype html>
<html>
    <head>
        <title>Options</title>
        <meta charset="UTF-8" />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                width: 240px;
                background: #222;
                padding: 0;
                color: #fff;
            }
            .header {
                background: #1a1a1a;
                padding: 10px 12px;
                display: flex;
                align-items: center;
                border-bottom: 1px solid #333;
                gap: 10px;
            }
            .header h3 {
                font-size: 14px;
                font-weight: 600;
                color: #fff;
            }
            #backBtn {
                display: flex;
                align-items: center;
                justify-content: center;
                background: rgba(255, 255, 255, 0.05);
                color: #fff;
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 4px;
                cursor: pointer;
                transition: all 0.2s;
                padding: 4px 6px;
                font-size: 12px;
                text-decoration: none;
            }
            #backBtn:hover {
                background: rgba(255, 255, 255, 0.1);
                border-color: rgba(255, 255, 255, 0.2);
            }
            .container {
                padding: 12px;
            }
            .description {
                color: #aaa;
                font-size: 13px;
                margin-bottom: 12px;
                text-align: center;
            }
            .options-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }
            .option-item {
                display: flex;
                align-items: center;
                gap: 8px;
                background: rgba(255, 255, 255, 0.04);
                padding: 8px 10px;
                border-radius: 6px;
                cursor: pointer;
                border: 1px solid transparent;
                transition: all 0.2s;
            }
            .option-item:hover {
                background: rgba(255, 255, 255, 0.08);
                border-color: rgba(255, 255, 255, 0.15);
            }
            /* Custom Checkbox */
            input[type="checkbox"] {
                appearance: none;
                background-color: #1a1a1a;
                border: 2px solid #555;
                width: 14px;
                height: 14px;
                border-radius: 3px;
                cursor: pointer;
                position: relative;
                flex-shrink: 0;
            }
            input[type="checkbox"]:checked {
                background-color: #4dabf7;
                border-color: #4dabf7;
            }
            input[type="checkbox"]:checked::after {
                content: "";
                position: absolute;
                left: 3px;
                top: 1px;
                width: 3px;
                height: 6px;
                border: solid white;
                border-width: 0 2px 2px 0;
                transform: rotate(45deg);
            }
            .option-label {
                cursor: pointer;
                font-size: 13px;
                font-weight: 500;
                color: #fff;
                flex: 1;
            }
            .section-divider {
                height: 1px;
                background: #333;
            }
            .section-title {
                font-size: 11px;
                font-weight: 600;
                color: #aaa;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin-bottom: 8px;
            }
            .cache-row {
                display: flex;
                align-items: center;
                justify-content: space-between;
                background: rgba(255, 255, 255, 0.04);
                padding: 8px 10px;
                border-radius: 6px;
                border: 1px solid transparent;
                margin-bottom: 8px;
            }
            .cache-row-label {
                font-size: 13px;
                font-weight: 500;
                color: #fff;
            }
            .ttl-select {
                background: #2a2a2a;
                color: #fff;
                border: 1px solid rgba(255, 255, 255, 0.15);
                border-radius: 4px;
                padding: 3px 6px;
                font-size: 12px;
                cursor: pointer;
                font-family: inherit;
                outline: none;
            }
            .ttl-select:focus {
                border-color: #4dabf7;
            }
            .reset-cache-btn {
                width: 100%;
                background: rgba(255, 59, 59, 0.08);
                color: #ff6b6b;
                border: 1px solid rgba(255, 59, 59, 0.2);
                border-radius: 6px;
                padding: 8px 10px;
                font-size: 13px;
                font-weight: 500;
                cursor: pointer;
                transition: all 0.2s;
                font-family: inherit;
                text-align: center;
            }
            .reset-cache-btn:hover {
                background: rgba(255, 59, 59, 0.18);
                border-color: rgba(255, 59, 59, 0.4);
            }
        </style>
    </head>
    <body>
        <div class="header">
            <a id="backBtn" href="popup.html">&larr; Back</a>
            <h3>Options</h3>
        </div>
        <div class="container">
            <div class="description">Select which resolutions to display:</div>
            <div class="options-grid">
                <label class="option-item">
                    <input type="checkbox" id="p144" />
                    <span class="option-label">144p</span>
                </label>
                <label class="option-item">
                    <input type="checkbox" id="p240" />
                    <span class="option-label">240p</span>
                </label>
                <label class="option-item">
                    <input type="checkbox" id="p360" />
                    <span class="option-label">360p</span>
                </label>
                <label class="option-item">
                    <input type="checkbox" id="p480" />
                    <span class="option-label">480p</span>
                </label>
                <label class="option-item">
                    <input type="checkbox" id="p720" />
                    <span class="option-label">720p</span>
                </label>
                <label class="option-item">
                    <input type="checkbox" id="p1080" />
                    <span class="option-label">1080p</span>
                </label>
            </div>
        </div>
        <div class="section-divider"></div>
        <div class="container">
            <div class="section-title">Cache</div>
            <div class="cache-row">
                <span class="cache-row-label">Duration</span>
                <select id="cacheTTL" class="ttl-select">
                    <option value="1">1 Day</option>
                    <option value="3">3 Days</option>
                    <option value="7">7 Days</option>
                </select>
            </div>
            <button id="resetCache" class="reset-cache-btn">Clear Cache</button>
        </div>
        <script src="dist/options.js"></script>
    </body>
</html>
