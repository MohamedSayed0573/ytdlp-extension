<!doctype html>
<html lang="en">
    <head>
        <title>Options</title>
        <meta charset="UTF-8" />
        <link rel="stylesheet" href="styles/options.css" />
    </head>
    <body>
        <div class="header">
            <a id="backBtn" href="popup.html">&larr; Back</a>
            <h3>Options</h3>
        </div>
        <div class="container">
            <div class="description">Select which resolutions to display:</div>
            <div id="options-grid"></div>
        </div>
        <div class="section-divider"></div>
        <div class="container">
            <div class="section-title">Cache</div>
            <div class="cache-row">
                <span class="cache-row-label">Duration</span>
                <select id="cacheTTL" class="ttl-select">
                    <option value="1">1 Day</option>
                    <option value="3">3 Days</option>
                    <option value="7">7 Days</option>
                </select>
            </div>
            <button id="resetCache" class="reset-cache-btn">Clear Cache</button>
        </div>
        <div class="section-divider"></div>
        <div class="container">
            <div class="section-title">API Fallback</div>
            <div class="api-fallback-row">
                <label class="api-fallback-toggle" for="apiFallback">
                    <input type="checkbox" id="apiFallback" />
                    <span class="api-fallback-label">Use backup server</span>
                </label>
                <div class="info-tooltip">
                    <button
                        type="button"
                        class="info-tooltip-trigger"
                        aria-label="More information about API fallback"
                    >
                        i
                    </button>
                    <div class="info-tooltip-content" role="tooltip">
                        Uses our backup server when local extraction fails. It can be slower. See
                        <a
                            href="https://github.com/MohamedSayed0573/TubeSize_Extension/blob/main/PRIVACY.md"
                            target="_blank"
                            style="color: inherit; text-decoration: underline"
                            >our privacy policy</a
                        >
                        for more details.
                    </div>
                </div>
            </div>
        </div>
        <div class="section-divider"></div>
        <div class="author">
            <a href="https://github.com/MohamedSayed0573" target="_blank">
                <img src="icons/github.svg" alt="" width="14" height="14" />
                @Mohamed Sayed
            </a>
        </div>
        <script src="dist/options.js"></script>
    </body>
</html>
