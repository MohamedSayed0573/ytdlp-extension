<!doctype html>
<html>
    <head>
        <title>Options</title>
        <meta charset="UTF-8" />
        <link rel="stylesheet" href="styles/options.css" />
    </head>
    <body>
        <div class="header">
            <a id="backBtn" href="popup.html">&larr; Back</a>
            <h3>Options</h3>
        </div>
        <div class="container">
            <div class="description">Select which resolutions to display:</div>
            <div id="options-grid"></div>
        </div>
        <div class="section-divider"></div>
        <div class="container">
            <div class="section-title">Cache</div>
            <div class="cache-row">
                <span class="cache-row-label">Duration</span>
                <select id="cacheTTL" class="ttl-select">
                    <option value="1">1 Day</option>
                    <option value="3">3 Days</option>
                    <option value="7">7 Days</option>
                </select>
            </div>
            <button id="resetCache" class="reset-cache-btn">Clear Cache</button>
        </div>
        <div class="section-divider"></div>
        <div class="container">
            <div class="section-title">API Fallback</div>
            <label class="api-fallback-row">
                <input type="checkbox" id="apiFallback" />
                <span class="api-fallback-label">Use API as fallback</span>
            </label>
        </div>
        <script src="dist/options.js"></script>
    </body>
</html>
