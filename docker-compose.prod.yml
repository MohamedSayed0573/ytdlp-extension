version: "3.8"

services:
    yt-dlp-api:
        image: mohammedsayed1/yt-dlp-api:latest
        container_name: yt-dlp-api
        ports:
            - "3000:3000"
        restart: always
        environment:
            - NODE_ENV=production
        volumes:
            - ~/.env:/api/.env
            - ~/www.youtube.com_cookies.txt:/api/www.youtube.com_cookies.txt
